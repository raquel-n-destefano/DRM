<!DOCTYPE html>
<html>
<head>
  <title>Word Quiz</title>
  <style>
    body { font-family: Arial, sans-serif; }
    #word { font-size: 3em; text-align: center; margin: 50px; }
    .quiz-question { margin-bottom: 20px; }
    .checkbox-grid { display: flex; flex-wrap: wrap; max-width: 600px; }
    .checkbox-grid label { width: 25%; margin-bottom: 5px; }
    #summary input { margin-right: 10px; }
  </style>
</head>
<body>

  <div id="app"></div>

  <script>
    // --- Data ---
    const words = ["fox", "head", "pony", "lobster",
                   "wiggle", "beaver", "possum", "mermaid",
                   "wag", "rat", "kite"];
    const questions = [
      {type: 'number', prompt: '5 * 7 =', answer: 35},
      {type: 'number', prompt: 'If Jonny has 10 apples, then Casey steals 4 of his apples, how many apples is Jonny left with?', answer: 6},
      {type: 'number', prompt: 'How many sides does a triangle have?', answer: 3},
      {type: 'select', prompt: 'Who is the current President of the United States?', options: ['Donald Trump','Joe Biden','Barack Obama','George W. Bush','Elon Musk'], answer: 'Joe Biden'},
      {type: 'number', prompt: 'How many times does the letter "e" appear in "Greetings, Earthling!"?', answer: 3},
      {type: 'check', prompt: 'Which of the following words were in the original list?',
       options: ["wag","wiggle","rat","mermaid","head","pony","desk","tail","beaver","fox","possum","kite","lobster"],
       targetWord: 'tail',
       wildcard: 'table',
       originalList: words
      }
    ];

    // --- State ---
    let currentIndex = 0;
    let userInfo = {name: '', age: '', gender: ''};
    let userAnswers = [];

    // --- Functions ---
    function showInstructions() {
      const app = document.getElementById("app");
      app.innerHTML = `
        <h2>Welcome to the Word Quiz!</h2>
        <p>Please enter your information:</p>
        <input id="name" placeholder="Name"/><br/><br/>
        <input id="age" placeholder="Age"/><br/><br/>
        <select id="gender">
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select><br/><br/>
        <button onclick="submitUserInfo()">Continue</button>
      `;
    }

    function submitUserInfo() {
      const name = document.getElementById("name").value.trim();
      const age = document.getElementById("age").value.trim();
      const gender = document.getElementById("gender").value;

      if (!name || !age || isNaN(parseInt(age)) || !gender) {
        alert("Please enter a valid name, integer age, and select gender.");
        return;
      }

      userInfo = {name, age: parseInt(age), gender};
      showWarning();
    }

    function showWarning() {
      const app = document.getElementById("app");
      app.innerHTML = `
        <h2>Instructions</h2>
        <p>You will see a series of words flash on the screen. Please pay attention and try to remember them. Select continue when ready.</p>
        <button onclick="startWordList()">Continue</button>
      `;
    }

    function startWordList() {
      currentIndex = 0;
      showWord();
    }

    function showWord() {
      const app = document.getElementById("app");
      if (currentIndex >= words.length) {
        showQuizIntro();
        return;
      }
      app.innerHTML = `<div id="word">${words[currentIndex]}</div>`;
      setTimeout(() => {
        currentIndex++;
        showWord();
      }, 1500);
    }

    function showQuizIntro() {
      const app = document.getElementById("app");
      app.innerHTML = `
        <h2>You will now be asked a series of questions.</h2>
        <button onclick="showQuestion(0)">Continue</button>
      `;
    }

    function showQuestion(qIndex) {
      currentIndex = qIndex;
      const q = questions[qIndex];
      const app = document.getElementById("app");

      if (q.type === 'number') {
        app.innerHTML = `
          <div class="quiz-question">
            <p>${q.prompt}</p>
            <input id="answer" placeholder="Enter a number"/>
          </div>
          <button onclick="submitAnswer()">Continue</button>
        `;
      } else if (q.type === 'select') {
        let optionsHtml = q.options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
        app.innerHTML = `
          <div class="quiz-question">
            <p>${q.prompt}</p>
            <select id="answer">${optionsHtml}</select>
          </div>
          <button onclick="submitAnswer()">Continue</button>
        `;
      } else if (q.type === 'check') {
        let checkboxes = q.options.map(opt => `
          <label><input type="checkbox" value="${opt}"/> ${opt}</label>
        `).join('');
        app.innerHTML = `
          <div class="quiz-question">
            <p>${q.prompt}</p>
            <div class="checkbox-grid">${checkboxes}</div>
          </div>
          <button onclick="submitAnswer()">Continue</button>
        `;
      }
    }

    function submitAnswer() {
      const q = questions[currentIndex];

      let answer;
      if (q.type === 'number') {
        const val = document.getElementById("answer").value;
        if (!val || isNaN(parseInt(val))) {
          alert("Please enter a number.");
          return;
        }
        answer = parseInt(val);
      } else if (q.type === 'select') {
        answer = document.getElementById("answer").value;
      } else if (q.type === 'check') {
        const checked = Array.from(document.querySelectorAll("input[type='checkbox']:checked")).map(cb => cb.value);
        answer = checked;
      }

      userAnswers.push({prompt: q.prompt, answer: answer});
      if (currentIndex + 1 < questions.length) {
        showQuestion(currentIndex + 1);
      } else {
        showSummary();
      }
    }

    function showSummary() {
      const app = document.getElementById("app");
      const lastQ = questions[questions.length - 1]; // checklist
      const selectedLower = userAnswers[userAnswers.length-1].answer.map(w => w.toLowerCase());
      const originalLower = lastQ.originalList.map(w => w.toLowerCase());

      const correct = selectedLower.filter(w => originalLower.includes(w));
      const incorrect = selectedLower.filter(w => !originalLower.includes(w));
      const missed = originalLower.filter(w => !selectedLower.includes(w));

      const targetLower = lastQ.targetWord.toLowerCase();
      const wildcardLower = lastQ.wildcard.toLowerCase();

      let targetStatus = selectedLower.includes(targetLower) ? "✔️ Target word selected" : "❌ Target word NOT selected";
      let wildcardStatus = selectedLower.includes(wildcardLower) ? "❌ Wildcard selected" : "✔️ Wildcard NOT selected";

      const checkboxes = lastQ.options.map(opt => `
        <label><input type="checkbox" ${userAnswers[userAnswers.length-1].answer.includes(opt) ? 'checked' : ''} disabled /> ${opt}</label>
      `).join('');

      app.innerHTML = `
        <h2>Quiz Complete! Please screenshot this page and send it.</h2>
        <p><strong>Name / Age / Gender:</strong> ${userInfo.name} / ${userInfo.age} / ${userInfo.gender}</p>
        <p><strong>${lastQ.prompt}</strong></p>
        <div class="checkbox-grid">${checkboxes}</div>
        <p>${targetStatus}</p>
        <p>${wildcardStatus}</p>
        <p>Correct words selected: ${correct.length}</p>
        <p>Words incorrectly selected: ${incorrect.length}</p>
        <p>Words missed: ${missed.length}</p>
      `;
    }

    // --- Start ---
    showInstructions();
  </script>

</body>
</html>
